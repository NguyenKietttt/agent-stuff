description = "Create a commit message by analyzing git diffs"

prompt = """
Propose a conventional commit message based on the following context.

### Workflow & Rules
- **Workflow:**
  1. Check `git status`. If nothing is staged, tell the user to stage files first.
  2. Review the staged changes in `git diff --staged`.
  3. Propose a commit message according to the rules below and wait for confirmation.
  4. Run `git commit` after user confirms.

- **Commit Format:** `<type><optional_scope>: <concise_description> <optional_body_explaining_why>`

- **Types:** feat, fix, refactor, chore, docs, style, test, perf, ci

- **Rules:**
  - Never add AI attribution (no Co-Authored-By, etc.).
  - Never auto-stage files — always ask the user to stage first.
  - Describe *why* not just what changed.
  - Use imperative mood ("add" not "added").
"""
